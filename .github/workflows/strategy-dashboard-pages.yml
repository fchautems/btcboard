name: Strategy BTC dashboard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "strategy-dashboard/**"
      - ".github/workflows/strategy-dashboard-pages.yml"
  schedule:
    - cron: "20 23 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: strategy-dashboard/requirements.txt

      - name: Install dependencies
        run: pip install -r strategy-dashboard/requirements.txt

      - name: Generate dashboard data
        run: python strategy-dashboard/generate_data.py

      - name: Prepare Pages artifact
        run: |
          mkdir -p dist
          cp strategy-dashboard/index.html dist/index.html
          cp strategy-dashboard/data.json dist/data.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
